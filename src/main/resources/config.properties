# =========================================================================
# Device / Appium server configuration
#
# Nothing environment-specific is hardcoded in Java code - everything the
# DriverFactory needs is read from this file (or overridden via -D system
# properties / CI environment variables). Override any key at run time with:
#   mvn test -Dappium.deviceName="Pixel_6_API_34"
# =========================================================================

# --- Appium server ---
appium.server.url=http://127.0.0.1:4723/

# --- Platform capabilities ---
appium.platformName=Android
appium.platformVersion=13.0
appium.deviceName=Android Emulator
appium.automationName=UiAutomator2

# --- Application under test ---
# Path to the "My Demo App" Android APK. The binary is NOT committed to this
# repo (see .gitignore) - download it from the releases page below and place
# it in ./apps/, or point this at any absolute path on disk.
# https://github.com/saucelabs/my-demo-app-android/releases
appium.app.path=apps/Android-MyDemoAppRN.apk
appium.app.package=com.saucelabs.mydemoapp.android
appium.app.activity=com.saucelabs.mydemoapp.android.MainActivity

# --- Timeouts (seconds) ---
appium.newCommandTimeout=120
wait.explicit.timeoutSeconds=15
wait.pollingIntervalMillis=250

# --- Behavior flags ---
appium.noReset=false
appium.fullReset=false
appium.autoGrantPermissions=true
